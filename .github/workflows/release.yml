name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            output: ota-windows.exe
          - os: ubuntu-latest
            output: ota-linux
          - os: macos-latest
            output: ota-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Set up C++ compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Set up C++ compiler
        if: runner.os == 'macOS'
        run: |
          # macOS has clang by default
          echo "Using clang"

      - name: Set up C++ compiler
        if: runner.os == 'Windows'
        run: |
          # Windows has g++ via MSYS2 or similar, but assuming it's available
          echo "Using g++"

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          g++ -std=c++11 -Wall -Wextra -O2 main.cpp function_parser.cpp config_reader.cpp golden_opt.cpp -o ota-windows.exe

      - name: Build on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          g++ -std=c++11 -Wall -Wextra -O2 main.cpp function_parser.cpp config_reader.cpp golden_opt.cpp -o ota-linux

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          g++ -std=c++11 -Wall -Wextra -O2 main.cpp function_parser.cpp config_reader.cpp golden_opt.cpp -o ota-darwin

      - name: Package source archives
        shell: bash
        run: |
          # Use git archive to avoid "file changed as we read it" caused by files being written during build.
          git archive --format=tar HEAD | gzip > ota-source-${{ github.ref_name }}.tar.gz
          git archive --format=zip -o ota-source-${{ github.ref_name }}.zip HEAD

      - name: Check source archives
        shell: bash
        run: |
          echo "= list source archives ="
          ls -la ota-source-${{ github.ref_name }}.tar.gz
          ls -la ota-source-${{ github.ref_name }}.zip

      - name: Check Windows artifact
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "= list windows artifact ="
          ls -la ota-windows.exe

      - name: Check Linux artifact
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "= list linux artifact ="
          ls -la ota-linux

      - name: Check macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "= list macos artifact ="
          ls -la ota-darwin

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ota-windows.exe
            ota-linux
            ota-darwin
            ota-source-${{ github.ref_name }}.tar.gz
            ota-source-${{ github.ref_name }}.zip