name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            output: ota-windows.exe
          - os: ubuntu-latest
            output: ota-linux
          - os: macos-latest
            output: ota-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Set up C++ compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Set up C++ compiler
        if: runner.os == 'macOS'
        run: |
          # macOS has clang by default
          echo "Using clang"

      - name: Set up C++ compiler
        if: runner.os == 'Windows'
        run: |
          # Windows has g++ via MSYS2 or similar, but assuming it's available
          echo "Using g++"

      - name: Build via Makefile on Windows
        if: matrix.os == 'windows-latest'
        run: |
          mingw32-make all
          copy ota.exe ota-windows.exe

      - name: Build via Makefile on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          make all
          cp ota.exe ota-linux

      - name: Build via Makefile on macOS
        if: matrix.os == 'macos-latest'
        run: |
          make all
          cp ota.exe ota-darwin

      - name: Package source archives
        run: |
          # Use git archive to avoid "file changed as we read it" caused by files being written during build.
          git archive --format=tar HEAD | gzip > ota-source-${{ github.ref_name }}.tar.gz
          git archive --format=zip -o ota-source-${{ github.ref_name }}.zip HEAD

      - name: Check artifacts
        run: |
          echo "= list artifacts ="
          ls -la ota-source-${{ github.ref_name }}.tar.gz
          ls -la ota-source-${{ github.ref_name }}.zip
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ls -la ota-windows.exe
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            ls -la ota-linux
          else
            ls -la ota-darwin
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.output }}
            ota-source-${{ github.ref_name }}.tar.gz
            ota-source-${{ github.ref_name }}.zip